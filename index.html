<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>عداد</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
}

/* العداد */
#counter{
    font-size:40vw;
    font-weight:bold;
    line-height:1;
}

/* الأزرار */
.topBtn{
    position:fixed;
    top:12px;
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    box-shadow:0 0 10px rgba(0,0,0,.4);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.15s;
}

.topBtn:active{
    transform:scale(.9);
}

/* زر النقصان */
#minusBtn{
    left:12px;
    background:#007bff;
}

/* زر التصفير */
#resetBtn{
    right:12px;
    background:red;
}

/* وميض الشاشة */
#flash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:9999;
}

.flashActive{
    animation: flashAnim 0.35s ease;
}

@keyframes flashAnim{
    0%   {opacity:0;}
    20%  {opacity:1;}
    100% {opacity:0;}
}
</style>
</head>

<body>

<button id="minusBtn" class="topBtn">−</button>
<button id="resetBtn" class="topBtn">↻</button>

<div id="counter">0</div>
<div id="flash"></div>

<script>
let count = 0;

const counter = document.getElementById("counter");
const minusBtn = document.getElementById("minusBtn");
const resetBtn = document.getElementById("resetBtn");
const flash = document.getElementById("flash");

function updateCounter(){
    counter.textContent = count;
}

/* تشغيل وميض الشاشة */
function flashScreen(){
    flash.classList.remove("flashActive");
    void flash.offsetWidth; // إعادة تشغيل الأنيميشن
    flash.classList.add("flashActive");
}

/* زيادة عند الضغط على الشاشة */
document.body.addEventListener("click", (e) => {
    if(e.target === minusBtn || e.target === resetBtn) return;

    count++;
    updateCounter();

    if(count >= 20){
        flashScreen();
        setTimeout(() => {
            count = 0;
            updateCounter();
        }, 350);
    }
});

/* إنقاص */
minusBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if(count > 0) count--;
    updateCounter();
});

/* تصفير */
resetBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    count = 0;
    updateCounter();
    flashScreen();
});
</script>

</body>
</html>
