<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>عداد</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="wts.png">

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
}

#counter{
    font-size:40vw;
    font-weight:bold;
    line-height:1;
}

/* طبقة الوميض */
#flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.12s ease;
    z-index:999;
}
  /* زر الرجوع - أزرق */
#backBtn{
    position:fixed;
    top:12px;
    left:12px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    box-shadow:0 0 12px rgba(13,110,253,.7);
    display:flex;
    align-items:center;
    justify-content:center;
}

#backBtn:active{
    transform:scale(.9);
}

/* زر التصفير - أحمر مع سهم دائري */
#resetBtn{
    position:fixed;
    top:12px;
    right:12px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:#dc3545;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    box-shadow:0 0 12px rgba(220,53,69,.7);
    display:flex;
    align-items:center;
    justify-content:center;
}

#resetBtn:active{
    transform:scale(.9);
}
 </style>
</head>
<body>

<button id="backBtn" title="إنقاص">−</button>

<button id="resetBtn" title="تصفير">↻</button>
<div id="counter">0</div>

<div id="flash"></div>

<script>
let count = 0;

const counter = document.getElementById("counter");
const resetBtn = document.getElementById("resetBtn");
const backBtn = document.getElementById("backBtn");
const flash = document.getElementById("flash");

function updateCounter(){
    counter.textContent = count;
}

/* وميض أبيض خافت */
function flashScreen(){

    flash.style.opacity = "0.25";

    setTimeout(() => {
        flash.style.opacity = "0";
    }, 120);

    setTimeout(() => {
        flash.style.opacity = "0.12";
    }, 200);

    setTimeout(() => {
        flash.style.opacity = "0";
    }, 320);
}

/* إبقاء الشاشة مضاءة */
let wakeLock = null;

async function keepScreenAwake(){
    try{
        if("wakeLock" in navigator){
            wakeLock = await navigator.wakeLock.request("screen");
        }
    }catch(err){
        console.log(err);
    }
}

keepScreenAwake();

document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible"){
        keepScreenAwake();
    }
});

/* زيادة العداد عند الضغط بأي مكان */
document.body.addEventListener("click", (e) => {

    if(e.target === resetBtn || e.target === backBtn){
        return;
    }

    count++;
    updateCounter();

    if(count >= 20){

        flashScreen();

        count = 0;
        updateCounter();
    }
});

/* تصفير العداد */
resetBtn.addEventListener("click", (e) => {

    e.stopPropagation();

    count = 0;
    updateCounter();

    flashScreen();
});

/* إنقاص العداد */
backBtn.addEventListener("click", (e) => {

    e.stopPropagation();

    if(count > 0){
        count--;
        updateCounter();
    }
});

/* تسجيل Service Worker */
if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}

updateCounter();
</script>

</body>
</html>
